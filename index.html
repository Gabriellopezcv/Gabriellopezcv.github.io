<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA.CERO | Intercepción</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Escaneo de monitor y viñeta oscura -->
    <div class="crt-scanlines"></div>
    <div class="vignette"></div>

    <!-- Fondo interactivo -->
    <canvas id="networkCanvas"></canvas>

    <header>
        <!-- El texto ahora se decodifica por JavaScript -->
        <h1 id="motto" class="decrypter-text"></h1>
    </header>

    <main>
        <div id="terminal-loader">
            <span id="loader-text">[sys.boot] Escaneando anomalías en el tejido de la realidad...</span>
            <div class="progress-bar"><div class="progress" id="loading-bar"></div></div>
        </div>
        
        <div class="garden-grid" id="jardinDigital"></div>
    </main>

    <footer>
        [ © 2026 ] // GABRIEL LOPEZ // REALITY IS A CONSENSUS HALLUCINATION // END_OF_LINE_
    </footer>

    <!-- BOTÓN CONEJO BLANCO -->
    <button id="rabbit-btn" title="Sigue al conejo blanco...">🐇</button>

    <!-- VENTANA EMERGENTE (MODAL LECTOR PROFUNDO) -->
    <div id="noteModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-classification">[ CLASIFICACIÓN: ALTO SECRETO ]</span>
                <button class="close-btn" id="closeModal">&times;</button>
            </div>
            <h2 id="modalTitle" class="modal-title"></h2>
            <div class="modal-meta" id="modalMeta"></div>
            
            <div class="modal-body" id="modalBody">
                <!-- Aquí se inyecta el contenido largo -->
            </div>
            
            <!-- Ahora el enlace al origen es un detalle al final, no el botón principal -->
            <div class="modal-footer">
                <a href="#" id="modalLink" target="_blank">[Verificar origen de la transmisión]</a>
            </div>
        </div>
    </div>

    <script src="app.js" defer></script>
</body>
</html>
