<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página en Construcción</title>
    <style>
        /* Reseteo básico y configuración del fondo */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden; /* Evita barras de desplazamiento */
            background-color: #050914; /* Azul oscuro casi negro, tipo espacio */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* El canvas ocupará toda la pantalla de fondo */
        #networkCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Contenedor central para tu texto provisional */
        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            text-align: center;
            color: #ffffff;
            pointer-events: none; /* Permite que los clics pasen al canvas */
        }

        .content h1 {
            font-size: 3.5rem;
            font-weight: 300;
            letter-spacing: 4px;
            color: #00f3ff; /* Color cian tecnológico */
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(0, 243, 255, 0.5);
            margin-bottom: 10px;
        }

        .content p {
            font-size: 1.2rem;
            color: #8c9bb0;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <!-- Texto de relleno, puedes cambiarlo o borrar el div entero -->
    <div class="content">
        <h1>Próximamente</h1>
        <p>Estamos preparando algo increíble.</p>
    </div>

    <!-- Lienzo donde se dibuja la red neuronal -->
    <canvas id="networkCanvas"></canvas>

    <script>
        const canvas = document.getElementById('networkCanvas');
        const ctx = canvas.getContext('2d');

        // Ajustar el tamaño del canvas a la ventana
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particlesArray = [];
        
        // Color de los nodos y líneas (cian tecnológico)
        const nodeColor = '100, 243, 255'; 

        // Escuchar cambios de tamaño en la ventana
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            init();
        });

        // Clase Partícula
        class Particle {
            constructor(x, y, directionX, directionY, size) {
                this.x = x;
                this.y = y;
                this.directionX = directionX;
                this.directionY = directionY;
                this.size = size;
            }

            // Dibuja el punto
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                ctx.fillStyle = `rgba(${nodeColor}, 0.8)`;
                ctx.fill();
            }

            // Actualiza la posición para crear el movimiento fluido
            update() {
                // Rebotar en los bordes
                if (this.x > canvas.width || this.x < 0) {
                    this.directionX = -this.directionX;
                }
                if (this.y > canvas.height || this.y < 0) {
                    this.directionY = -this.directionY;
                }

                // Mover la partícula
                this.x += this.directionX;
                this.y += this.directionY;

                this.draw();
            }
        }

        // Crear la red de partículas
        function init() {
            particlesArray = [];
            // Densidad de partículas adaptada al tamaño de la pantalla
            let numberOfParticles = (canvas.height * canvas.width) / 12000;
            
            for (let i = 0; i < numberOfParticles; i++) {
                let size = (Math.random() * 2) + 0.5; // Tamaño del punto
                let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
                let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
                
                // Velocidad reducida para que se mueva suave "como agua"
                let directionX = (Math.random() * 0.8) - 0.4;
                let directionY = (Math.random() * 0.8) - 0.4;
                
                particlesArray.push(new Particle(x, y, directionX, directionY, size));
            }
        }

        // Conectar las partículas con líneas si están cerca
        function connect() {
            let opacityValue = 1;
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x))
                                 + ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));
                    
                    // Si la distancia es menor a este valor, dibuja una línea
                    if (distance < 15000) {
                        // La línea es más transparente cuanto más lejos están
                        opacityValue = 1 - (distance / 15000);
                        ctx.strokeStyle = `rgba(${nodeColor}, ${opacityValue})`;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        // Bucle de animación
        function animate() {
            requestAnimationFrame(animate);
            // Limpiar el rastro anterior
            ctx.clearRect(0, 0, innerWidth, innerHeight);
            
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
            }
            connect();
        }

        // Iniciar
        init();
        animate();
    </script>
</body>
</html>
