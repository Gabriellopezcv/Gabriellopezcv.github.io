<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memoria Caché | Jardín Digital</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #0b101e 0%, #020306 100%);
            font-family: 'Share Tech Mono', monospace;
            color: #c8e0ff;
            /* Permite hacer scroll si hay muchas notas */
            overflow-x: hidden; 
        }

        /* El canvas ahora se queda fijo en el fondo */
        #networkCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* Envía el fondo atrás */
        }

        /* Barra de navegación */
        nav {
            width: 100%;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(11, 16, 30, 0.7);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 243, 255, 0.2);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .logo {
            font-size: 1.5rem;
            color: #00f3ff;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
        }

        .nav-links a {
            color: #8c9bb0;
            text-decoration: none;
            margin-left: 20px;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #00f3ff;
        }

        /* Cabecera principal */
        header {
            text-align: center;
            padding: 80px 20px 40px;
        }

        header h1 {
            font-size: clamp(1.2rem, 3vw, 2.5rem);
            color: #c8e0ff;
            font-weight: 400;
            line-height: 1.6;
            text-shadow: 0 0 10px rgba(0, 200, 255, 0.4);
            letter-spacing: 2px;
        }

        .cursor {
            display: inline-block;
            width: 12px;
            height: 1em;
            background-color: #00f3ff;
            vertical-align: middle;
            animation: blink 1s step-end infinite;
            margin-left: 8px;
            box-shadow: 0 0 10px #00f3ff;
            transform: translateY(-2px);
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Contenedor del Jardín Digital (Grid de notas) */
        main {
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .garden-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        /* Tarjetas de notas (Glassmorphism) */
        .node-card {
            background: rgba(11, 16, 30, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 243, 255, 0.15);
            border-radius: 8px;
            padding: 25px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .node-card:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 243, 255, 0.6);
            box-shadow: 0 10px 20px rgba(0, 243, 255, 0.1);
        }

        /* Decoración de la tarjeta (línea superior) */
        .node-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #00f3ff, #8a2be2);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .node-card:hover::before {
            opacity: 1;
        }

        .node-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: #8c9bb0;
            margin-bottom: 15px;
            border-bottom: 1px dashed rgba(140, 155, 176, 0.3);
            padding-bottom: 10px;
        }

        .node-title {
            font-size: 1.2rem;
            color: #00f3ff;
            margin-bottom: 15px;
        }

        .node-content {
            font-size: 0.95rem;
            line-height: 1.5;
            color: #a0b2c6;
        }

    </style>
</head>
<body>

    <!-- Fondo interactivo -->
    <canvas id="networkCanvas"></canvas>

    <!-- Menú de navegación -->
    <nav>
        <div class="logo">sys.cache</div>
        <div class="nav-links">
            <a href="#">/inicio</a>
            <a href="#">/nodos</a>
            <a href="#">/bitacora</a>
        </div>
    </nav>

    <!-- Cabecera -->
    <header>
        <h1>"Tus recuerdos no son tuyos,<br>son solo datos guardados en caché."<span class="cursor"></span></h1>
    </header>

    <!-- Contenedor principal donde JavaScript inyectará las notas -->
    <main>
        <div class="garden-grid" id="jardinDigital">
            <!-- Las tarjetas se cargarán aquí automáticamente -->
        </div>
    </main>

    <script>
        // --- CÓDIGO DEL FONDO ANIMADO (Ligeramente ajustado) ---
        const canvas = document.getElementById('networkCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];
        let particleCount;
        let connectionDistance;
        const mouse = { x: null, y: null, radius: 150 };

        window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener('touchmove', (e) => { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; });
        window.addEventListener('mouseleave', () => { mouse.x = null; mouse.y = null; });
        window.addEventListener('touchend', () => { mouse.x = null; mouse.y = null; });

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            const area = width * height;
            particleCount = Math.floor(area / 9000); // Ligeramente menos denso para no distraer del texto
            connectionDistance = width < 768 ? 90 : 130;
            initParticles();
        }
        window.addEventListener('resize', resize);

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 2 + 0.5;
                this.angle = Math.random() * Math.PI * 2;
                this.velocity = Math.random() * 0.4 + 0.1;
                this.angularVelocity = (Math.random() - 0.5) * 0.02;
                this.z = Math.random();
            }
            update() {
                this.angle += this.angularVelocity;
                this.x += Math.cos(this.angle) * this.velocity;
                this.y += Math.sin(this.angle) * this.velocity;
                if (this.x < -50) this.x = width + 50;
                if (this.x > width + 50) this.x = -50;
                if (this.y < -50) this.y = height + 50;
                if (this.y > height + 50) this.y = -50;
                if (mouse.x != null) {
                    let dx = mouse.x - this.x;
                    let dy = mouse.y - this.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < mouse.radius) {
                        const force = (mouse.radius - distance) / mouse.radius;
                        this.x -= (dx / distance) * force * 1.5;
                        this.y -= (dy / distance) * force * 1.5;
                    }
                }
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                const alpha = 0.1 + (this.z * 0.4);
                ctx.fillStyle = `rgba(0, 243, 255, ${alpha})`;
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < particleCount; i++) { particles.push(new Particle()); }
        }

        function drawConnections() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    let dx = particles[i].x - particles[j].x;
                    let dy = particles[i].y - particles[j].y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < connectionDistance) {
                        let mouseEnhance = 0;
                        if (mouse.x != null) {
                            let mDx = mouse.x - (particles[i].x + particles[j].x) / 2;
                            let mDy = mouse.y - (particles[i].y + particles[j].y) / 2;
                            let mDist = Math.sqrt(mDx * mDx + mDy * mDy);
                            if (mDist < mouse.radius) { mouseEnhance = 1 - (mDist / mouse.radius); }
                        }
                        let opacity = (1 - (distance / connectionDistance)) * (0.15 + mouseEnhance * 0.4);
                        let gradient = ctx.createLinearGradient(particles[i].x, particles[i].y, particles[j].x, particles[j].y);
                        gradient.addColorStop(0, `rgba(0, 243, 255, ${opacity})`);
                        gradient.addColorStop(1, `rgba(138, 43, 226, ${opacity * 0.4})`);
                        ctx.beginPath();
                        ctx.strokeStyle = gradient;
                        ctx.lineWidth = 1 + (mouseEnhance * 1.5);
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }
            drawConnections();
            requestAnimationFrame(animate);
        }

        resize();
        animate();

        // --- CÓDIGO DEL JARDÍN DIGITAL (Fetch JSON) ---
        
        async function cargarNotas() {
            const grid = document.getElementById('jardinDigital');
            
            try {
                // Hacemos la petición al archivo JSON
                const respuesta = await fetch('datos.json');
                
                // Si hay un error al leer el archivo (ej. no existe)
                if (!respuesta.ok) {
                    throw new Error('No se pudo cargar la base de datos local');
                }

                const notas = await respuesta.json();

                // Iteramos sobre cada nota en el JSON y creamos el HTML
                notas.forEach(nota => {
                    const tarjetaHTML = `
                        <article class="node-card">
                            <div class="node-meta">
                                <span>${nota.categoria}</span>
                                <span>${nota.estado} | ${nota.fecha}</span>
                            </div>
                            <h2 class="node-title">${nota.titulo}</h2>
                            <p class="node-content">${nota.contenido}</p>
                        </article>
                    `;
                    // Añadimos la tarjeta al grid
                    grid.innerHTML += tarjetaHTML;
                });

            } catch (error) {
                console.error("Error cargando los datos:", error);
                grid.innerHTML = `<p style="color: red; text-align: center; width: 100%;">Error de conexión con la base de datos simulada (datos.json). Asegúrate de que el archivo existe y estás usando un servidor local para probarlo.</p>`;
            }
        }

        // Ejecutar la carga de notas al iniciar
        cargarNotas();

    </script>
</body>
</html>
