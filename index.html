<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memoria Caché | Jardín Digital</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #0b101e 0%, #020306 100%);
            font-family: 'Share Tech Mono', monospace;
            color: #c8e0ff;
            overflow-x: hidden; 
        }

        #networkCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; 
        }

        nav {
            width: 100%;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(11, 16, 30, 0.7);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 243, 255, 0.2);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .logo {
            font-size: 1.5rem;
            color: #00f3ff;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
            font-weight: bold;
        }

        .nav-links a {
            color: #8c9bb0;
            text-decoration: none;
            margin-left: 20px;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #00f3ff;
        }

        header {
            text-align: center;
            padding: 80px 20px 40px;
        }

        header h1 {
            font-size: clamp(1.2rem, 3vw, 2.5rem);
            color: #c8e0ff;
            font-weight: 400;
            line-height: 1.6;
            text-shadow: 0 0 10px rgba(0, 200, 255, 0.4);
            letter-spacing: 2px;
        }

        .cursor {
            display: inline-block;
            width: 12px;
            height: 1em;
            background-color: #00f3ff;
            vertical-align: middle;
            animation: blink 1s step-end infinite;
            margin-left: 8px;
            box-shadow: 0 0 10px #00f3ff;
            transform: translateY(-2px);
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        main {
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
            padding-bottom: 100px;
        }

        .garden-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .node-card {
            background: rgba(11, 16, 30, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 243, 255, 0.15);
            border-radius: 8px;
            padding: 25px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            cursor: pointer; /* Indica que se puede hacer clic */
        }

        .node-card:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 243, 255, 0.6);
            box-shadow: 0 10px 20px rgba(0, 243, 255, 0.1);
        }

        .node-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #00f3ff, #8a2be2);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .node-card:hover::before { opacity: 1; }

        .node-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: #8c9bb0;
            margin-bottom: 15px;
            border-bottom: 1px dashed rgba(140, 155, 176, 0.3);
            padding-bottom: 10px;
        }

        .node-title {
            font-size: 1.2rem;
            color: #00f3ff;
            margin-bottom: 15px;
        }

        .node-content {
            font-size: 0.95rem;
            line-height: 1.5;
            color: #a0b2c6;
        }

        /* --- ESTILOS DEL MODAL (VENTANA FLOTANTE) --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(2, 3, 6, 0.8);
            backdrop-filter: blur(8px);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-content {
            background: rgba(11, 16, 30, 0.95);
            border: 1px solid rgba(0, 243, 255, 0.5);
            border-radius: 8px;
            width: 90%;
            max-width: 700px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 40px;
            position: relative;
            transform: translateY(20px);
            transition: transform 0.3s ease;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.1);
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 2rem;
            color: #00f3ff;
            background: none;
            border: none;
            cursor: pointer;
            transition: color 0.3s;
        }

        .close-btn:hover {
            color: #8a2be2;
        }

        .modal-title {
            color: #00f3ff;
            margin-bottom: 10px;
            font-size: 1.8rem;
        }
        
        .modal-meta {
            font-size: 0.85rem;
            color: #8c9bb0;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(0, 243, 255, 0.2);
            padding-bottom: 10px;
        }

        .modal-body {
            color: #c8e0ff;
            line-height: 1.8;
            font-size: 1.05rem;
            white-space: pre-wrap; /* Respeta los saltos de línea del JSON */
        }

        /* Scrollbar personalizado para el modal */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #050914; }
        ::-webkit-scrollbar-thumb { background: #00f3ff; border-radius: 4px; }

    </style>
</head>
<body>

    <!-- Fondo interactivo -->
    <canvas id="networkCanvas"></canvas>

    <!-- Menú de navegación -->
    <nav>
        <div class="logo">gabriellopez.es</div>
        <div class="nav-links">
            <a href="#">/inicio</a>
            <a href="#">/nodos</a>
            <a href="#">/bitacora</a>
        </div>
    </nav>

    <!-- Cabecera -->
    <header>
        <h1>"Tus recuerdos no son tuyos,<br>son solo datos guardados en caché."<span class="cursor"></span></h1>
    </header>

    <!-- Contenedor de Notas -->
    <main>
        <div class="garden-grid" id="jardinDigital">
            <!-- Las tarjetas se cargarán aquí -->
        </div>
    </main>

    <!-- VENTANA EMERGENTE (MODAL) PARA LEER LA NOTA COMPLETA -->
    <div id="noteModal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-btn" id="closeModal">&times;</button>
            <h2 id="modalTitle" class="modal-title"></h2>
            <div class="modal-meta" id="modalMeta"></div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script>
        // --- 1. FONDO ANIMADO ---
        const canvas = document.getElementById('networkCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles = [], particleCount, connectionDistance;
        const mouse = { x: null, y: null, radius: 150 };

        window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener('touchmove', (e) => { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; });
        window.addEventListener('mouseleave', () => { mouse.x = null; mouse.y = null; });
        window.addEventListener('touchend', () => { mouse.x = null; mouse.y = null; });

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particleCount = Math.floor((width * height) / 9000); 
            connectionDistance = width < 768 ? 90 : 130;
            initParticles();
        }
        window.addEventListener('resize', resize);

        class Particle {
            constructor() {
                this.x = Math.random() * width; this.y = Math.random() * height;
                this.size = Math.random() * 2 + 0.5; this.angle = Math.random() * Math.PI * 2;
                this.velocity = Math.random() * 0.4 + 0.1; this.angularVelocity = (Math.random() - 0.5) * 0.02;
                this.z = Math.random();
            }
            update() {
                this.angle += this.angularVelocity;
                this.x += Math.cos(this.angle) * this.velocity; this.y += Math.sin(this.angle) * this.velocity;
                if (this.x < -50) this.x = width + 50; if (this.x > width + 50) this.x = -50;
                if (this.y < -50) this.y = height + 50; if (this.y > height + 50) this.y = -50;
                if (mouse.x != null) {
                    let dx = mouse.x - this.x, dy = mouse.y - this.y, dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < mouse.radius) {
                        const force = (mouse.radius - dist) / mouse.radius;
                        this.x -= (dx / dist) * force * 1.5; this.y -= (dy / dist) * force * 1.5;
                    }
                }
            }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0, 243, 255, ${0.1 + (this.z * 0.4)})`; ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < particleCount; i++) particles.push(new Particle());
        }

        function drawConnections() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    let dx = particles[i].x - particles[j].x, dy = particles[i].y - particles[j].y;
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < connectionDistance) {
                        let mouseEnhance = 0;
                        if (mouse.x != null) {
                            let mDx = mouse.x - (particles[i].x + particles[j].x) / 2;
                            let mDy = mouse.y - (particles[i].y + particles[j].y) / 2;
                            let mDist = Math.sqrt(mDx * mDx + mDy * mDy);
                            if (mDist < mouse.radius) mouseEnhance = 1 - (mDist / mouse.radius);
                        }
                        let opacity = (1 - (dist / connectionDistance)) * (0.15 + mouseEnhance * 0.4);
                        let gradient = ctx.createLinearGradient(particles[i].x, particles[i].y, particles[j].x, particles[j].y);
                        gradient.addColorStop(0, `rgba(0, 243, 255, ${opacity})`);
                        gradient.addColorStop(1, `rgba(138, 43, 226, ${opacity * 0.4})`);
                        ctx.beginPath(); ctx.strokeStyle = gradient; ctx.lineWidth = 1 + (mouseEnhance * 1.5);
                        ctx.moveTo(particles[i].x, particles[i].y); ctx.lineTo(particles[j].x, particles[j].y); ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            for (let i = 0; i < particles.length; i++) { particles[i].update(); particles[i].draw(); }
            drawConnections(); requestAnimationFrame(animate);
        }

        resize(); animate();

        // --- 2. SISTEMA DE NOTAS Y MODAL ---
        const modal = document.getElementById('noteModal');
        const closeModalBtn = document.getElementById('closeModal');
        window.notasData = []; // Guardaremos las notas aquí globalmente

        // Cerrar modal con botón X
        closeModalBtn.addEventListener('click', () => modal.classList.remove('active'));
        
        // Cerrar modal si haces clic fuera de la ventana
        modal.addEventListener('click', (e) => {
            if (e.target === modal) modal.classList.remove('active');
        });

        // Función para abrir la nota que se ha clickeado
        function abrirNota(index) {
            const nota = window.notasData[index];
            document.getElementById('modalTitle').innerText = nota.titulo;
            document.getElementById('modalMeta').innerText = `${nota.categoria} | ${nota.estado} | ${nota.fecha}`;
            document.getElementById('modalBody').innerText = nota.contenido;
            modal.classList.add('active');
        }

        async function cargarNotas() {
            const grid = document.getElementById('jardinDigital');
            try {
                const respuesta = await fetch('datos.json');
                if (!respuesta.ok) throw new Error('No se pudo cargar la base de datos');
                
                const notas = await respuesta.json();
                window.notasData = notas; // Guardamos en la variable global para poder abrirlas luego

                notas.forEach((nota, index) => {
                    // Cortamos el contenido a 90 caracteres para la vista previa
                    const resumen = nota.contenido.length > 90 
                                    ? nota.contenido.substring(0, 90) + "..." 
                                    : nota.contenido;

                    const tarjetaHTML = `
                        <!-- Aquí pasamos el índice de la nota al hacer clic -->
                        <article class="node-card" onclick="abrirNota(${index})">
                            <div class="node-meta">
                                <span>${nota.categoria}</span>
                                <span>${nota.estado}</span>
                            </div>
                            <h2 class="node-title">${nota.titulo}</h2>
                            <p class="node-content">${resumen}</p>
                        </article>
                    `;
                    grid.innerHTML += tarjetaHTML;
                });

            } catch (error) {
                console.error("Error:", error);
                grid.innerHTML = `<p style="color: #ff4444; grid-column: 1 / -1; text-align: center;">Error conectando con datos.json.</p>`;
            }
        }

        cargarNotas();

    </script>
</body>
</html>
