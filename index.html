<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA.CERO // GABRIEL.LOPEZ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Filtros de monitor CRT -->
    <div class="crt-overlay"></div>
    <div class="scanlines"></div>

    <!-- Motor Gráfico de Fondo -->
    <canvas id="cyber-canvas"></canvas>

    <!-- Pantalla de Arranque (Desaparece al cargar) -->
    <div id="boot-screen">
        <div class="boot-text">
            <p>> INICIANDO SISTEMA.CERO...</p>
            <p>> ESTABLECIENDO CONEXIÓN SEGURA...</p>
            <p>> DESENCRIPTANDO INTERFAZ_ <span class="blink">█</span></p>
        </div>
        <div class="progress-bar-container"><div id="boot-progress"></div></div>
    </div>

    <!-- Interfaz Principal (HUD) -->
    <main id="hud-interface" class="hidden">
        
        <!-- Cabecera -->
        <header class="hud-header">
            <div class="glitch-title" data-text="SYS.CERO // NODO_CENTRAL">SYS.CERO // NODO_CENTRAL</div>
            <div class="status-indicator">
                <span class="dot blink"></span> ESTADO: ONLINE // HOST: GITHUB_PAGES
            </div>
        </header>

        <!-- Navegación Cyberpunk -->
        <nav class="hud-nav">
            <button class="cyber-btn active" data-target="inicio">
                <span class="btn-text">/INICIO</span>
            </button>
            <button class="cyber-btn" data-target="habilidades">
                <span class="btn-text">/ESPECIFICACIONES</span>
            </button>
            <button class="cyber-btn" data-target="archivos">
                <span class="btn-text">/ARCHIVOS_PROYECTOS</span>
            </button>
            <button class="cyber-btn" data-target="contacto">
                <span class="btn-text">/ENLACE_COMUNICACIÓN</span>
            </button>
        </nav>

        <!-- Pantalla de Visualización de Datos -->
        <section class="hud-display">
            <div class="display-frame">
                <div class="frame-corners top-left"></div>
                <div class="frame-corners top-right"></div>
                <div class="frame-corners bottom-left"></div>
                <div class="frame-corners bottom-right"></div>
                
                <!-- Aquí se inyecta el contenido con JS -->
                <div id="content-screen" class="terminal-text">
                    <!-- Contenido dinámico -->
                </div>
            </div>
        </section>

    </main>

    <!-- Pie de página del sistema -->
    <footer id="hud-footer" class="hidden">
        [ ID_USUARIO: INVITADO ] // [ ACCESO: LECTURA ] // PROTOCOLO_2026 // END_OF_LINE
    </footer>

    <script src="app.js"></script>
</body>
</html>
