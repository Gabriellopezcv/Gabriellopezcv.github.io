<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memoria Caché | Interceptando Datos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Capa de escaneo de monitor antiguo -->
    <div class="crt-scanlines"></div>

    <!-- Fondo interactivo -->
    <canvas id="networkCanvas"></canvas>

    <!-- Cabecera con el nuevo lema inquietante -->
    <header>
        <h1 class="glitch-text" data-text='"No eres el usuario. Eres el conjunto de datos de entrenamiento."'>
            "No eres el usuario.<br>Eres el conjunto de datos de entrenamiento."<span class="cursor"></span>
        </h1>
    </header>

    <main>
        <div id="terminal-loader">
            <span id="loader-text">[sys.boot] Iniciando protocolo de intercepción de señales...</span>
            <div class="progress-bar"><div class="progress" id="loading-bar"></div></div>
        </div>
        
        <div class="garden-grid" id="jardinDigital"></div>
    </main>

    <!-- Nuevo pie de página (Footer) -->
    <footer>
        [ © 2026 ] // GABRIEL LOPEZ // ALL SYSTEM RIGHTS RESERVED. // END_OF_LINE_
    </footer>

    <!-- VENTANA EMERGENTE (MODAL) -->
    <div id="noteModal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-btn" id="closeModal">&times;</button>
            <h2 id="modalTitle" class="modal-title"></h2>
            <div class="modal-meta" id="modalMeta"></div>
            <div class="modal-body" id="modalBody"></div>
            <a href="#" id="modalLink" class="cyber-btn" target="_blank">Acceder al nodo original &rarr;</a>
        </div>
    </div>

    <script src="app.js" defer></script>
</body>
</html>
