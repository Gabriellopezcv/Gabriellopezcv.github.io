<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memoria Caché</title>
    <style>
        /* Importamos una fuente tipográfica estilo "hacker/cyberpunk" */
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* Fondo con gradiente radial profundo */
            background: radial-gradient(circle at center, #0b101e 0%, #020306 100%);
            font-family: 'Share Tech Mono', monospace;
        }

        #networkCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            text-align: center;
            width: 90%;
            max-width: 800px;
            pointer-events: none; /* Permite interactuar con el canvas detrás */
        }

        .content h1 {
            /* clamp() hace que el texto sea perfectamente responsivo (mínimo 1.2rem, ideal 4vw, máximo 3rem) */
            font-size: clamp(1.2rem, 4vw, 3rem);
            color: #c8e0ff;
            font-weight: 400;
            line-height: 1.6;
            text-shadow: 0 0 10px rgba(0, 200, 255, 0.4),
                         0 0 20px rgba(0, 200, 255, 0.2);
            letter-spacing: 2px;
        }
        
        /* Efecto de cursor parpadeante de terminal */
        .content .cursor {
            display: inline-block;
            width: 12px;
            height: 1em;
            background-color: #00f3ff;
            vertical-align: middle;
            animation: blink 1s step-end infinite;
            margin-left: 8px;
            box-shadow: 0 0 10px #00f3ff;
            transform: translateY(-2px);
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="content">
        <h1>"Tus recuerdos no son tuyos,<br>son solo datos guardados en caché."<span class="cursor"></span></h1>
    </div>

    <canvas id="networkCanvas"></canvas>

    <script>
        const canvas = document.getElementById('networkCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];
        
        // Variables para la responsividad
        let particleCount;
        let connectionDistance;

        // Interacción con el ratón o toque
        const mouse = { x: null, y: null, radius: 150 };

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        // Soporte para pantallas táctiles (móviles)
        window.addEventListener('touchmove', (e) => {
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        });

        window.addEventListener('mouseleave', () => {
            mouse.x = null;
            mouse.y = null;
        });
        window.addEventListener('touchend', () => {
            mouse.x = null;
            mouse.y = null;
        });

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            
            // Adaptar la cantidad de partículas al área de la pantalla
            const area = width * height;
            particleCount = Math.floor(area / 8000); 
            
            // Si es móvil, reducir la distancia de conexión
            connectionDistance = width < 768 ? 90 : 130;
            
            init();
        }

        window.addEventListener('resize', resize);

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.baseSize = Math.random() * 2 + 0.5;
                this.size = this.baseSize;
                
                // Configuración de movimiento "líquido / agua" usando ángulos
                this.angle = Math.random() * Math.PI * 2;
                this.velocity = Math.random() * 0.5 + 0.1;
                // Velocidad angular crea la trayectoria en curvas en lugar de líneas rectas
                this.angularVelocity = (Math.random() - 0.5) * 0.02;
                
                // Simulamos profundidad con Z
                this.z = Math.random();
            }

            update() {
                // Actualizar el ángulo para el movimiento sinuoso
                this.angle += this.angularVelocity;
                this.dx = Math.cos(this.angle) * this.velocity;
                this.dy = Math.sin(this.angle) * this.velocity;

                this.x += this.dx;
                this.y += this.dy;

                // Teletransporte suave si salen de la pantalla para flujo continuo
                if (this.x < -50) this.x = width + 50;
                if (this.x > width + 50) this.x = -50;
                if (this.y < -50) this.y = height + 50;
                if (this.y > height + 50) this.y = -50;

                // Efecto de repulsión suave con el ratón/dedo
                if (mouse.x != null) {
                    let dx = mouse.x - this.x;
                    let dy = mouse.y - this.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < mouse.radius) {
                        const force = (mouse.radius - distance) / mouse.radius;
                        this.x -= (dx / distance) * force * 1.5;
                        this.y -= (dy / distance) * force * 1.5;
                    }
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                // Las partículas "más lejanas" son más tenues
                const alpha = 0.2 + (this.z * 0.6);
                ctx.fillStyle = `rgba(0, 243, 255, ${alpha})`;
                ctx.fill();
            }
        }

        function init() {
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function drawConnections() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    let dx = particles[i].x - particles[j].x;
                    let dy = particles[i].y - particles[j].y;
                    let distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < connectionDistance) {
                        // Iluminar la red si el ratón está cerca de las líneas
                        let mouseEnhance = 0;
                        if (mouse.x != null) {
                            let mDx = mouse.x - (particles[i].x + particles[j].x) / 2;
                            let mDy = mouse.y - (particles[i].y + particles[j].y) / 2;
                            let mDist = Math.sqrt(mDx * mDx + mDy * mDy);
                            if (mDist < mouse.radius) {
                                mouseEnhance = 1 - (mDist / mouse.radius);
                            }
                        }

                        let opacity = (1 - (distance / connectionDistance)) * (0.2 + mouseEnhance * 0.6);
                        
                        // Gradiente lineal entre dos nodos para un efecto más profesional y tecnológico
                        let gradient = ctx.createLinearGradient(particles[i].x, particles[i].y, particles[j].x, particles[j].y);
                        gradient.addColorStop(0, `rgba(0, 243, 255, ${opacity})`);
                        gradient.addColorStop(1, `rgba(138, 43, 226, ${opacity * 0.4})`); // Tono morado/neón
                        
                        ctx.beginPath();
                        ctx.strokeStyle = gradient;
                        ctx.lineWidth = 1 + (mouseEnhance * 1.5);
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            // Limpiamos el canvas en cada frame
            ctx.clearRect(0, 0, width, height);
            
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }
            
            drawConnections();
            requestAnimationFrame(animate);
        }

        // Arrancar
        resize();
        animate();
    </script>
</body>
</html>
