<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memoria Caché | Interceptando Datos</title>
    <!-- Vinculamos la hoja de estilos externa -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Capa de escaneo de monitor antiguo (Efecto Cyberpunk) -->
    <div class="crt-scanlines"></div>

    <!-- Fondo interactivo -->
    <canvas id="networkCanvas"></canvas>

    <!-- Cabecera sin menús, directa al mensaje -->
    <header>
        <h1 class="glitch-text" data-text='"Tus recuerdos no son tuyos, son solo datos guardados en caché."'>
            "Tus recuerdos no son tuyos,<br>son solo datos guardados en caché."<span class="cursor"></span>
        </h1>
    </header>

    <main>
        <!-- Consola de estado -->
        <div id="terminal-loader">
            <span id="loader-text">[sys.boot] Iniciando protocolo de intercepción de señales...</span>
            <div class="progress-bar"><div class="progress" id="loading-bar"></div></div>
        </div>
        
        <!-- Cuadrícula de tarjetas -->
        <div class="garden-grid" id="jardinDigital"></div>
    </main>

    <!-- VENTANA EMERGENTE (MODAL) -->
    <div id="noteModal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-btn" id="closeModal">&times;</button>
            <h2 id="modalTitle" class="modal-title"></h2>
            <div class="modal-meta" id="modalMeta"></div>
            <div class="modal-body" id="modalBody"></div>
            <a href="#" id="modalLink" class="cyber-btn" target="_blank">Acceder al nodo original &rarr;</a>
        </div>
    </div>

    <!-- Vinculamos el archivo JavaScript externo -->
    <script src="app.js" defer></script>
</body>
</html>
